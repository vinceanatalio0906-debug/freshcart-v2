<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreshCart - Payment</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        const isLoggedIn = localStorage.getItem("userToken");
        if (!isLoggedIn) {
            window.location.replace("/login.html");
        }
    </script>
</head>
<body>
    <section id="header">
        <div class="logo-container">
            <i class="fa-solid fa-cart-shopping" style="color: #a531ab;"></i>
            <span style="font-weight: 700; color: #fff; margin-left: 10px;">FreshCart</span>
        </div>
        <div>
            <ul id="navbar">
                <li><a href="index.html">Home</a></li>
                <li><a href="shop.html">Shop</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li id="lg-bag"><a href="cart.html"><i class="fa-solid fa-bag-shopping"></i></a></li>
                <a href="javascript:void(0)" id="close"><i class="fa-solid fa-xmark"></i></a>
            </ul>
        </div>
        <div id="mobile">
            <a href="cart.html"><i class="fa-solid fa-bag-shopping"></i></a>
            <i id="bar" class="fas fa-outdent"></i>
        </div>
    </section>

    <section id="page-header" class="about-header">
        <h2>Payment</h2>
        <p>Complete your order using your card details.</p>
    </section>

    <main class="checkout-page section-p1">
        <section class="checkout-panel">
            <div class="checkout-heading">
                <i class="fa-solid fa-credit-card"></i>
                <div>
                    <h3>Payment Details</h3>
                    <p>Enter your payment information to place your order.</p>
                </div>
            </div>

            <form id="demo-payment-form" class="payment-form">
                <label for="card-name">Name on card</label>
                <input id="card-name" type="text" placeholder="Juan Dela Cruz" autocomplete="cc-name" required>

                <label for="card-number">Card number</label>
                <input id="card-number" type="text" inputmode="numeric" maxlength="19" placeholder="4242 4242 4242 4242" autocomplete="cc-number" required>

                <div class="payment-fields">
                    <div>
                        <label for="card-expiry">Expiry</label>
                        <input id="card-expiry" type="text" inputmode="numeric" maxlength="5" placeholder="12/30" autocomplete="cc-exp" required>
                    </div>
                    <div>
                        <label for="card-cvv">CVV</label>
                        <input id="card-cvv" type="password" inputmode="numeric" maxlength="4" placeholder="123" autocomplete="cc-csc" required>
                    </div>
                </div>

                <button id="demo-pay-button" class="normal checkout-pay-btn" type="submit">
                    <i class="fa-solid fa-lock"></i>
                    Pay order
                </button>
            </form>
        </section>

        <aside class="checkout-panel order-summary">
            <div class="checkout-heading">
                <i class="fa-solid fa-receipt"></i>
                <div>
                    <h3>Order Summary</h3>
                    <p id="checkout-item-count">0 items</p>
                </div>
            </div>
            <div id="checkout-items" class="checkout-items"></div>
            <div class="checkout-total-row">
                <span>Total</span>
                <strong id="checkout-total">&#8369;0</strong>
            </div>
            <a class="back-to-cart" href="cart.html">
                <i class="fa-solid fa-arrow-left"></i>
                Back to cart
            </a>
        </aside>
    </main>

    <footer class="section-p1">
        <div class="copyright">
            <p>&copy; 2026, FreshCart - Official Online Marketplace</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
